<h1 class="text-[#101010] text-[28px] font-bold">Кредит</h1>

<div class="flex mt-5 gap-2">
  @for (tab of tabs; track tab.value) {
    <a
      class="flex justify-center items-center px-[15px] py-[9px] border border-transparent text-lg text-[#5C5C5C] font-semibold leading-5 rounded-xl"
      [class.!border-[#EBEBEB]]="rla.isActive"
      [class.!text-[#171717]]="rla.isActive"
      [class.bg-white]="rla.isActive"
      [routerLink]="['/loans', tab.value]"
      routerLinkActive="active-tab"
      #rla="routerLinkActive"
    > {{ tab.title }} </a>
  }
</div>

<div class="bg-white rounded-3xl mt-5">
  <router-outlet></router-outlet>
</div>
