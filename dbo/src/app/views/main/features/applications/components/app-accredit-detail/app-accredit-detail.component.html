<div class="flex flex-col gap-y-3">
  <!-- Business Name -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">Название компании</span>
    <span>{{ detail.businessName }}</span>
  </div>

  <!-- INN -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">ИНН</span>
    <span>{{ detail.inn }}</span>
  </div>

  <!-- Currency -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">Валюта</span>
    <span>{{ detail.currency }}</span>
  </div>

  <!-- Amount -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">Сумма</span>
    <span>{{ amountService.convertToAmount(detail.amount) }}</span>
  </div>

  <!-- User ID -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">ID Пользователя</span>
    <span>{{ detail.userId }}</span>
  </div>

  <!-- Business ID -->
  <div class="flex gap-x-4 items-center text-[14px]">
    <span class="w-[130px] text-secondary">ID Бизнеса</span>
    <span>{{ detail.businessId }}</span>
  </div>

  <!-- Attachments -->
  <div *ngIf="detail.attachment1 || detail.attachment2 || detail.attachment3" class="flex flex-col gap-y-2">
    <span class="w-[130px] text-secondary">Приложения</span>
    <div class="flex flex-col gap-y-1">
      <a *ngIf="detail.attachment1" href="{{ detail.attachment1 }}" target="_blank" class="text-blue-500 underline text-[14px]">
        Приложение 1
      </a>
      <a *ngIf="detail.attachment2" href="{{ detail.attachment2 }}" target="_blank" class="text-blue-500 underline text-[14px]">
        Приложение 2
      </a>
      <a *ngIf="detail.attachment3" href="{{ detail.attachment3 }}" target="_blank" class="text-blue-500 underline text-[14px]">
        Приложение 3
      </a>
    </div>
  </div>
</div>
