<div class="h-full flex flex-col gap-y-5 bg-[#FFF] rounded-2xl">
    <div class="flex justify-between px-[30px] items-center pt-6 border-b border-[#ECECED]">
        <div class="justify-center text-[#2C3531] text-xl font-semibold leading-loose">Код назначения</div>
        <mat-icon (click)="closeDialog()">close</mat-icon>
    </div>
  <div class="relative px-5">
    <input [value]="this.searchText() ?? ''" (input)="inputAccSubject.next($event)" type="text" placeholder="Найти" class="border-none text-[16px] text-[#5c5c5c] outline-none w-full bg-[#F7F7F7] h-[56px] px-10 rounded-[16px]">
    <img width="20" class="absolute top-[18px] left-[34px]" src="./assets/svg/search.svg" alt="">
  </div>
    <div class="flex flex-col gap-y-[10px] overflow-y-auto pb-5">
        <div class="flex flex-col">
          @for (mfo of this.mfoList; track mfo) {
            <label class="inline-flex border-b bg-white items-center cursor-pointer" [for]="mfo.nibbdBankBranchCode"  (click)="this.data.setMfo(mfo); closeDialog()">
              <div class="w-full px-10 flex flex-col gap-[10px] ">
                <div
                  class=" w-full justify-between flex h-[87px] m-auto items-center cursor-pointer rounded-[16px]"
                >
                  <div class="flex gap-4 items-center">
                    <div class="flex flex-col justify-between gap-[3px]">
                     <span
                       class="text-[16px] font-normal">{{ mfo?.nibbdBankBranchCode}}</span>
                      <span class="text-[#A3A3A3] font-normal text-[14px]">{{ mfo.name }}</span>
                    </div>
                  </div>
                  <!--                        <div class="flex gap-3 items-center">-->
                  <!--                            <input type="radio" name="option" class="outline-none w-[30px] h-[30px]" id='radio-custom-1'/>-->
                  <!--                        </div>-->
                </div>
              </div>
            </label>
          }
        </div>
    </div>
</div>
