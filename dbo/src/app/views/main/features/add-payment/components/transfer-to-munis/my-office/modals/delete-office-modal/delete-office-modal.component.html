<div *ngIf="open" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     (click)="onCancel()">
  <div @dialogAnim class="bg-surface-2 rounded-[42px] shadow-lg w-full max-w-lg mx-4 px-9 pb-6 pt-18 relative"
       (click)="$event.stopPropagation()">
    <img (click)="onCancel()"
         class="absolute cursor-pointer w-[15px] h-[15px] top-[40px] right-[35px]" src="./assets/new-icons/close.svg"
         alt="">
    <div class="mt-16 mb-8 flex flex-col gap-4">
      <img class="w-[68px] h-[68px]" src="./assets/new-icons/warning.svg" alt="">
      <p class="text-[28px] leading-[32px] font-bold">{{ title }}</p>
    </div>
    <div class="flex flex-col gap-12 items-center text-center">
      <!--      <input type="text" (input)="onSetTitle($event)" [value]="title"-->
      <!--              placeholder="Название офиса" class="border bg-surface-4 border-custom-border focus:border-[#008C79]-->
      <!--           px-4 w-full text-[14px] placeholder:text-[14px] placeholder:text-[A3A3A3] placeholder:font-normal text-custom-primary font-medium-->
      <!--           rounded-[16px] h-[56px] outline-none" />-->
      <div class="flex gap-2 items-center w-full">
        <button class="bg-surface-4 font-semibold w-full outline-none rounded-[12px] text-[#000000] h-[48px]"
                (click)="onAgree()">{{ 'createPayment.yes_btn' | translate }}</button>
        <button class=" w-full bg-[#00A38D] font-semibold outline-none rounded-[12px] text-white  h-[48px]"
                (click)="onCancel()">{{'createPayment.cancel' | translate}}</button>
      </div>
    </div>
  </div>
</div>
