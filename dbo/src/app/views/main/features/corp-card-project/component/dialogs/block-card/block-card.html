<div class="bg-white rounded-3xl px-9 pb-4 dark:bg-[#181818] dark:border dark:border-[#333333]">
  <div class="flex justify-end mt-4">
    <div (click)="closeDialog()" mat-dialog-close
      class="justify-center text-end flex items-center rounded-full h-8 w-8 p-[6px] bg-[#F4F5F6]">
      <img src="assets/new-icons/close.svg">
    </div>
  </div>
  <div class="w-[60px] h-[60px] bg-[#F7F7F7] rounded-[50%] flex justify-center items-center">
      <img src="assets/new-icons/bank-cards/block-card-dialog.svg" alt="Block icon">
  </div>

  <!-- When card status active -->
  <div *ngIf="this.card.status == 'ACTIVE'">
    <div class="justify-start text-[#171717] text-[28px] font-bold mb-2 mt-5 dark:text-white">
      {{ 'accounts.confirm_block_card' | translate }}
    </div>

    <div class="text-[16px] mb-6 text-[#A3A3A3] mt-3">
      <p>  {{ 'new.you_will_not_be_able_to_make_any_transactions_with' | translate }}</p>
    </div>
  </div>

  <!-- When card status blocked -->

  <div *ngIf="this.card.status == 'BLOCKED'">
    <div class="justify-start text-[#171717] text-[28px] font-bold mb-2 mt-5">
      {{ 'new.are_you_sure_you_want_to_unblock' | translate }}
    </div>

    <div class="text-[16px] text-[#A3A3A3] mb-6 mt-3">
      <p> {{ 'new.once_unblocked_you_will_be_able_to_make_transactio' | translate }}</p>
    </div>
  </div>


  <div class="grid grid-cols-2 gap-4">
    <button (click)="confirm()" class="bg-[#F5F5F5] gap-[6px] py-[12px] py-[16px] rounded-[16px] text-[#171717] font-semibold dark:bg-[#262626] dark:text-white">{{ 'salaryStatements.yes' | translate }}</button>
    <button (click)="closeDialog()" class="bg-[#00A38D] gap-[6px] py-[12px] py-[16px] rounded-[16px]  text-white  font-semibold">{{ 'accounts.cancel' | translate }}</button>
  </div>
</div>
