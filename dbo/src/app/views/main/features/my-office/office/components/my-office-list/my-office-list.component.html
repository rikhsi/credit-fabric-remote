<div
  class="flex items-start space-x-4 overflow-x-auto scrollbar-hide mt-4"
  appScrollable>
  <ng-container *ngIf="isLoading">
    <span
      class="skeleton flex-none block w-[277px] h-[83px] rounded-2xl"
      *ngFor="let item of [].constructor(5).fill(0)"></span>
  </ng-container>
  <app-ui-button-add (click)="addOffice()"></app-ui-button-add>
  <ng-container *ngIf="!isLoading && offices?.length !== 0">

    <ng-container *ngFor="let item of offices">
      <app-my-office-item
        (actions)="doAction($event, item.uuid,item.name)" [selected]="office"
        [office]="item"></app-my-office-item>
    </ng-container>
  </ng-container>

  <ng-container *ngIf="!isLoading && offices?.length === 0">

    <div class="bg-white p-2 rounded-2xl max-w-[239px] h-[83px] shadow-slight">
      no office
    </div>
  </ng-container>
</div>
