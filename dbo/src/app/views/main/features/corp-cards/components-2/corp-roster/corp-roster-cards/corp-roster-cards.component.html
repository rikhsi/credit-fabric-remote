<div class="p-6 bg-white rounded-[15px] shadow flex-col justify-start w-full gap-5 inline-flex">
  <div class="flex flex-col gap-y-2">
    <app-container-nav [navs]="navs()"></app-container-nav>
    <app-container-title [title]="'Карты Реестра'"></app-container-title>
  </div>
  <div class="flex justify-between gap-x-5 items-center">
    <app-table-actions [tableActionBtns]="tableActionBtns()" (onClick)="onActionClick($event)" />
    <app-filter-button
      [src]="filterState() ? './assets/svg/filter-black.svg' : './assets/svg/filter-white.svg'"
      [classes]="filterState() ? '' : 'bg-[#008C79] text-white'"
      (click)="filterState.set(!filterState()) "
    ></app-filter-button>
  </div>
  <app-container-table
    [columns]="tableColumns()"
    [data]="transactions()"
    [loading]="isLoading()"
    [custom]="true"
    [errorMessage]="errorMessage()"
    [size]="pageSize()"
    [numbering]="true"
    (rowClicked)="getPaymentDetails($event)"
    (selectedRows)="onSelectedRows($event)"
  ></app-container-table>
  <app-paginator
    [itemsPerPage]="pageSize()"
    [currentPage]="pageIndex() + 1"
    [totalItems]="totalItems()"
    (pageChange)="pageChange($event)"
  ></app-paginator>
</div>
