<div class="flex flex-col gap-y-5">
  <div class="flex justify-between gap-x-5 items-center">
    <app-table-actions [tableActionBtns]="tableActionBtns()" (onClick)="onActionClick($event)" />

    <div class="flex gap-x-5 items-center">
      <button
        (click)="syncEmployeeCards()"
        mat-ripple
        type="button"
        class="px-5 py-2.5 bg-[#008C79] rounded-[5px]  justify-center items-center gap-2 inline-flex text-white text-sm font-normal h-10  leading-none">
        Обновить список
        <img ngSrc="./assets/svg/refresh-2.svg"  alt="refresh" width="24" height="24">
      </button>
      <mat-form-field class="small" appearance="outline">
        <mat-label>Тип карты</mat-label>
        <mat-select [value]="selectedType()" (selectionChange)="getSelectedItem($event)">
          <mat-option *ngFor="let type of salaryTypeCards()" [value]="type.value">{{type.key}}</mat-option>
        </mat-select>
        <mat-icon matSuffix><img ngSrc="./assets/svg/chevron-down.svg" class="rotate-90" alt="chevron-down" width="30" height="30"></mat-icon>
      </mat-form-field>
    </div>
  </div>

  <app-container-table
    [columns]="tableColumns()"
    [data]="employees()"
    [loading]="isLoading()"
    [custom]="true"
    [errorMessage]="errorMessage()"
    [size]="pageSize()"
    (rowClicked)="navigateToInside($event)"
    (selectedRows)="onSelectedRows($event)"
  ></app-container-table>
  <app-paginator
    [itemsPerPage]="pageSize()"
    [currentPage]="pageIndex() + 1"
    [totalItems]="totalItems()"
    (pageChange)="pageChange($event)"
  ></app-paginator>

</div>
