<div class="bg-white p-6 rounded-[16px] border border-[#EBEBEB] dark:bg-[#181818]">
 <div class="text-end mb-2">
   <mat-icon class="dark:text-white" mat-dialog-close>close</mat-icon>
 </div>
  <form [formGroup]="titleFrom" class="flex flex-col space-y-4 outline-input-box">
    <mat-form-field appearance="outline">
      <mat-label class="dark:text-white">{{'salaryStatements.names' | translate}}</mat-label>
      <input matInput placeholder="Введите название" class="dark:text-white" formControlName="title">
    </mat-form-field>
    <button type="submit" (click)="submit()" class="bg-[#008C79] h-[50px] w-full rounded-[10px] p-2.5 flex justify-center items-center text-[16px] text-white font-medium leading-4">{{'salaryStatements.save' | translate}}</button>
  </form>
</div>
