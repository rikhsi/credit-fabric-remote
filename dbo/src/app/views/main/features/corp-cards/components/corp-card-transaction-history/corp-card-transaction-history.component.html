<div class="flex flex-col gap-y-4">
  <app-container-nav [navs]="navs()"></app-container-nav>
  <div class="flex justify-between items-center">
    <app-container-title [title]="'История операций'"></app-container-title>
    <div class="flex space-x-2 items-center">
      <div class="rounded-[10px] bg-white p-2 justify-center flex items-center text-blue-500">VISA</div>
      <div class="flex flex-col">
        <span class="text-[16px] font-semibold leading-6 text-[#2C3531]">Visa Business</span>
        <span class="text-[#9799A1] font-normal text-sm leading-5">123</span>
      </div>
    </div>
  </div>
</div>
<div class="p-6 rounded-2xl mt-4 bg-white flex flex-col space-y-4">
  <div class="border-b border-[#E0E0E0]">
    <div class="flex justify-between items-end pb-2">
      <div class="flex space-x-6">
        <ng-container *ngFor="let tab of transactionTabs(); let i = index">
          <button
            (click)="activeTransactions.set(i)"
            class="relative text-sm font-medium leading-[18px]"
            [ngClass]="{
              'text-[#008C79]': activeTransactions() === i,
              'text-[#2C3531]': activeTransactions() !== i
            }"
          >
            {{ tab }}
            <span
              *ngIf="activeTransactions() === i"
              class="absolute -bottom-2 left-0 w-full h-[2px] bg-[#008C79] rounded-full transition-all duration-300"
            ></span>
          </button>
        </ng-container>
      </div>
    </div>
  </div>

  <app-container-table
    [columns]="tableColumns"
    [data]="Transactions"
    [custom]="true"
    [numbering]="true"
  ></app-container-table>
</div>
