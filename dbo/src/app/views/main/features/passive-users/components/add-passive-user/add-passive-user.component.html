<div class="p-6 rounded-xl bg-white">
  <button class="absolute justify-center items-center top-0 rounded-full p-[1.5px] right-0 flex bg-white"
          (click)="_dialogRef.close()">
    <mat-icon class="text-base font-bold rounded-full border-[1.5px] border-[#A1A1A1] ">close</mat-icon>
  </button>
  <p class="font-medium text-xl pb-4">Добавление пассивного пользователя</p>
  <div class="p-6 rounded-xl border-1px border-secondary">
    <form [formGroup]="addForm" class="flex flex-col gap-y-4">
      <div>
        <p class="text-base font-semibold leading-normal not-italic text-black block">Имя</p>
        <input
          placeholder="Введите имя"
          formControlName="name"
          class="font-normal  text-black  text-base h-11 px-4 border border-solid border-secondary  rounded-10px focus:outline-none w-full"/>
      </div>
      <div>
        <p class="text-base font-semibold leading-normal not-italic text-black block">Фамилия</p>
        <input
          placeholder="Введите фамилию"
          formControlName="surname"
          class="font-normal  text-black  text-base h-11 px-4 border border-solid border-secondary  rounded-10px focus:outline-none w-full"/>
      </div>
      <div>
        <p class="text-base font-semibold leading-normal not-italic text-black block">Номер телефона</p>
        <input
          prefix="998"
          mask=" 00 000 00 00"
          [showMaskTyped]="true"
          [placeHolderCharacter]="''"
          [dropSpecialCharacters]="false"
          formControlName="phoneNumber"
          type="text" class="rounded-12px border-1px border-secondary w-full h-11 px-2 outline-none"
          placeholder="Введите номер телефона">
      </div>
     <div>
       <p class="text-base font-semibold leading-normal not-italic text-black block">Пароль</p>
       <div class="relative">
         <app-ui-svg-icon path="./assets/icons/inputs-icons.svg#password-check"
                          svgClass="w-6 h-6 pointer-events-none  absolute top-1/2 transform -translate-y-1/2 left-3"/>
         <input [type]="isPasswordShown ? 'text' : 'password'"
                placeholder="Введите пароль"
                autocomplete="on"
                formControlName="password"
                class="font-normal pl-10 text-black  text-base h-11 px-4 border border-solid border-secondary  rounded-10px focus:outline-none w-full"/>
         <app-ui-svg-icon (click)="isPasswordShown = !isPasswordShown"
                          path="./assets/icons/inputs-icons.svg#eye{{isPasswordShown ? '-slash' : ''}}"
                          svgClass="absolute cursor-pointer right-2 top-6 -translate-y-1/2 w-6 h-6"></app-ui-svg-icon>
       </div>
     </div>
      <div class="flex justify-between items-center gap-x-2">
        <button type="button" class="w-full h-[38px] bg-[#EBECF6] text-[#B0B8C1] rounded-xl" (click)="_dialogRef.close()">Отменить</button>
        <button (click)="formSubmit()" type="submit"
                [disabled]="addForm.invalid"
                [ngClass]="addForm.valid ? 'text-white bg-secondary' : 'text-[#B0B8C1] bg-disabled-button cursor-not-allowed'"
                class="h-[38px] flex justify-center items-center rounded-xl w-full"><span
          class="text-base leading-normal not-italic">Подтвердить</span></button>
      </div>
    </form>
  </div>
</div>
