<div class="p-6 bg-white rounded-xl h-full flex flex-col gap-y-4 relative">
<div class="flex justify-between items-center">
  <p class="text-2xl font-medium leading-6">Пассивные пользователи</p>
  <button
    matRipple
    (click)="pUsersAddDialog()"
    class="px-4 flex items-center">
    <span class="text-primary font-medium text-base">Добавить</span>
    <mat-icon class="text-primary ms-4">add</mat-icon>
  </button>
</div>
  <div class="p-4 border-[1px] border-[#EFF0F2] rounded-xl mt-4 w-full overflow-x-scroll">

    <table class="w-full text-left salary-table">
      <thead class="text-sm">
      <tr class="border-b">
        <th scope="col">Логин</th>
        <th scope="col">Номер телефона</th>
        <th scope="col" class="text-center">Действия</th>
      </tr>
      </thead>
      <tbody class="text-[#5B5B5B]">
        @for (user of usersList; track user) {
          <tr class="border-b border-b-border_secondary last:border-none">
            <td>{{user.username}}</td>
            <td>{{user.phoneNumber}}</td>
            <td>
              <app-ui-svg-icon
                path="./assets/icons/btn-icons.svg#salary_actions"
                svgClass="w-6 h-6 text-white mx-auto cursor-pointer"  [matMenuTriggerFor]="menu"></app-ui-svg-icon>
              <mat-menu #menu="matMenu" xPosition="after" class="menu-actions">
                <div (click)="deletePassiveUser(user.id)"  class=" p-2 flex gap-x-2 items-center cursor-pointer">
                  <app-ui-svg-icon
                    path="./assets/icons/btn-icons.svg#trash"
                    svgClass="w-6 h-6"></app-ui-svg-icon>
                  <div class="text-xs">Удалить</div>
                </div>
              </mat-menu>
            </td>
          </tr>
        }
      </tbody>
    </table>
    <mat-paginator
      #paginator
      class="ml-auto"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 15, 20]"
      showFirstLastButtons
      (page)="pageChanged($event)"
      aria-label="Select page"
    >
    </mat-paginator>
  </div>
</div>
