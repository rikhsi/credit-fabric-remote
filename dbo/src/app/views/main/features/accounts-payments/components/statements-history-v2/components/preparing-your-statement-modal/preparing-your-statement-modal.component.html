<div class="bg-white rounded-[42px] border border-solid border-white p-6 w-[504px] h-[354px]">
  <div class="flex flex-col h-full">
    <div class="flex justify-end">
      <div (click)="_matDialogRef.close()"
        class="p-2 rounded-xl bg-[#EBEBEB] cursor-pointer flex items-center justify-center">
        <mat-icon>close</mat-icon>
      </div>
    </div>

    <div class="flex-1">
      <div class=" flex flex-col items-center">
        <div class="loader relative">
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50">
            <mat-icon color="#00a38d"
              class="text-primary-base z-50 relative text-[40px] w-full h-full person">person</mat-icon>
          </div>
        </div>
        <span class="my-4 font-semibold text-soft-400 text-center"> Готовим вашу <br> выписку</span>
      </div>
    </div>

    <div class="flex items-center justify-end">
      <button (click)="_matDialogRef.close()"
        class="rounded-xl bg-primary-base text-white px-6 py-5 font-semibold">Закрыть</button>
    </div>
  </div>
</div>
