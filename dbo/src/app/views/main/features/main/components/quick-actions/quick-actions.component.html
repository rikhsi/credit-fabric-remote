<div class="flex flex-col gap-y-[10px] w-full">
  @if(showHeader) {
    <div class="flex gap-x-[5px] items-center">
      <div class="text-secondary font-xs">{{ title }}</div>
      <img
        ngSrc="../../../../../../../assets/svg/settings.svg" alt="settings" width="17" height="17"
        (click)="onSettings.emit()"
      >
    </div>
  }

  <div
    class="gap-x-5 gap-y-[15px] flex flex-wrap"
    [ngClass]="class"
  >
    @for (action of actions; track action) {
      @if(action.visible) {
        <app-action
          [class]="actionClass"
          [svg]="action?.src || ''"
          [title]="action.title"
          [link]="action?.link || ''"
        ></app-action>
      }
    }
  </div>
</div>
