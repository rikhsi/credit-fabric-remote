  <div class="w-full flex flex-col space-y-4">
    <!-- HEADER -->
    <div class="flex justify-between text-xs font-normal leading-4 text-[#9799A1]">
      <span class="flex-1">ВАЛЮТА</span>
      <span class="flex-1 text-center">ПОКУПКА</span>
      <span class="flex-1 text-end">ПРОДАЖА</span>
    </div>
    @if (isLoading()) {
      @for (i of [1, 2, 3, 4]; track i) {
        <!--          <div-->
          <!--            class="gap-2 flex flex-col bg-[#F3F5F5] rounded-2xl p-4 justify-items-end items-start !min-w-[218px] animate-skeleton">-->
          <!--            <div class="h-4 w-1/3 rounded skeleton-field"></div>-->
          <!--            <div class="space-y-2">-->

          <!--            </div>-->
          <!--            <div class="h-4 w-2/3 rounded skeleton-text"></div>-->
          <!--          </div>-->
        <div class="flex bg-[#F3F5F5] rounded-2xl p-4 !min-w-[218px] items-center justify-between animate-skeleton">
          <div class="flex items-center space-x-1 flex-1 skeleton-field">
            <div></div>
            <span class="text-[#2C3531] text-sm font-semibold leading-tight"></span>
          </div>
          <div class="flex-1 text-center text-[#2C3531] skeleton-text text-sm font-semibold leading-tight"></div>
          <div class="flex-1 text-end text-[#2C3531] skeleton-text text-sm font-semibold leading-tight"></div>
        </div>
      }
    } @else {
      @for (currency of data; track currency) {
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-1 flex-1">
            <img
              [src]="currency.alias === 'USD' ? './assets/svg/USD.svg' : currency.alias === 'EUR' ? './assets/svg/EUR.svg' : currency.alias === 'RUB' ?  './assets/svg/RUB.svg' : currency.alias === 'CHF' ?  './assets/svg/CHF.svg' : currency.alias === 'GBP' ? './assets/svg/GBP.svg' : ''"
              alt="#" class="w-6 h-6"/>
            <span class="text-[#2C3531] text-sm font-semibold leading-tight">{{ currency.alias }}</span>
          </div>
          <div
            class="flex-1 text-center text-[#2C3531] text-sm font-semibold leading-tight">{{ currency.rate.purchase / 100 | mask: 'separator' }}
          </div>
          <div
            class="flex-1 text-end text-[#2C3531] text-sm font-semibold leading-tight">{{ currency.rate.sale / 100 | mask: 'separator' }}
          </div>
        </div>
      }
    }
