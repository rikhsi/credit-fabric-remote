<div @dialogAnim class="relative w-[540px] h-[300px] overflow-hidden py-10 bg-[#00A38D] px-10 z-50 rounded-[42px] flex flex-col gap-2">
  <div class="flex justify-end z-20 cursor-pointer">
    <img src="./assets/new-icons/close-filled.svg" (click)="close()" alt="">
  </div>
  <div class="flex flex-1 flex-col mb-8">
    <h3 class="text-white text-[38px] font-bold leading-10"> {{this.data.title}}</h3>
     <p class="text-[#99D1C9] text-[20px] font-medium">Документ № {{this.data.docNum}}</p> 
  </div>


  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4 opacity-0">
      <img src="./assets/icons/info.svg" alt="">
    </div>
    <button (click)="close()" class="bg-white absolute bottom-[30px] right-[45px] outline-none z-20 cursor-pointer w-[110px] h-[48px] text-black rounded-[12px]">Закрыть</button>
  </div>
  <img class="absolute z-0 right-0 top-0" src="./assets/new-icons/success-logo-white.svg" alt="">
</div>
