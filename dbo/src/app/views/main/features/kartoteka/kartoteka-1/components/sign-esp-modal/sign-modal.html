  <div @dialogAnim style="max-height: 90vh" class="modal shadow-lg p-8 rounded-[42px]
   w-[540px] overflow-auto bg-white shadow-modal-auth">
    <div class="flex relative flex-col gap-4 text-start">
      <img (click)="close()" class="absolute right-0 cursor-pointer" src="./assets/new-icons/close-filled.svg" alt="">
      <h3 class="text-[32px] font-bold w-2/3 leading-[40px] mt-4">Выберите способ подписания</h3>
      <div class="flex flex-col gap-2">
        <div (click)="espDialog()" class="bg-[#F5F5F5] cursor-pointer rounded-[20px] px-4 py-5 flex gap-5 items-center">
          <img src="./assets/new-icons/with-phys-esp.svg" alt="">
          <div>
            <p class="text-[16px] text-[#171717] font-medium">Через ЭЦП</p>
            <span class="text-[14px] text-[#A3A3A3] font-normal">Пройти подтверждение</span>
          </div>
        </div>
        <div (click)="qrDialog()" class="bg-[#F5F5F5] cursor-pointer rounded-[20px] px-4 py-5 flex gap-5 items-center">
          <img src="./assets/new-icons/qr-code.svg" alt="">
          <div>
            <p class="text-[16px] text-[#171717] font-medium">Подпись через QR-код</p>
            <span class="text-[14px] text-[#A3A3A3] font-normal">QR-кода для подписи через мобильное приложение</span>
          </div>
        </div>
      </div>
    </div>
  </div>
