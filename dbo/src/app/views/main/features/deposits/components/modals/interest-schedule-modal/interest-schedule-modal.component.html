<div class=" h-full flex flex-col bg-surface-2 rounded-2xl overflow-hidden">

  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-5 border-b border-gray-100">
    <h2 class="text-lg font-semibold text-gray-900">
      График начисления процентов
    </h2>
    <div   (click)="close()" class="w-7 h-7 relative bg-custom-zink-100 rounded-md flex justify-center items-center overflow-hidden cursor-pointer">
      <div class="!text-[14px] leading-none flex items-center justify-center">
        <mat-icon class="text-custom-text-close !text-[14px] !h-[14px] !w-[14px] "> close </mat-icon>
      </div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="flex-1 overflow-y-auto">

    <!-- Taxes section -->
    <div class="px-4 pt-5 pb-4 border-b border-gray-100">
      <p class="text-base font-semibold text-custom-secondary mb-4">Налоги</p>
      <button
        (click)="requestCertificate()"
        class="flex flex-col items-center gap-2 cursor-pointer group">
        <div class="w-12 h-12 rounded-full border border-[#008C79]/30  flex items-center justify-center group-hover:bg-[#008C79]/10 transition-colors">
            <svg width="19" height="22" viewBox="0 0 19 22" fill="none" xmlns="http://www.w3.org/2000/svg">

            </svg>
        </div>
        <span class="text-xs text-center font-medium text-custom-secondary leading-tight">Запросить<br>справку</span>
      </button>
    </div>

    <!-- Schedule table -->
    <div class="px-4 py-4">
      <div class="grid grid-cols-2 pb-3 mb-1">
        <span class="text-sm text-custom-secondary ml-[60px]">Месяц</span>
        <span class="text-sm text-custom-secondary   text-start">Сумма</span>
      </div>

      <div class="flex flex-col gap-0">
        @for (item of data; track item.month) {
          <div class="grid grid-cols-2 items-center py-2">
            <div class="flex items-center ml-10 text-center gap-3">
              <span class="w-2 h-2 rounded-full bg-primary-base flex-shrink-0"></span>
              <span class="text-sm text-custom-primary">{{ item.month }}</span>
            </div>
            <span class="text-sm text-custom-primary text-start font-medium">
              + {{ formatAmount(item.amount) }} {{ item.currency }}
            </span>
          </div>
        }
      </div>
    </div>

  </div>
</div>
