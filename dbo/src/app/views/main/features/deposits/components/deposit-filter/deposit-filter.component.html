<form [formGroup]="filterForm" class="flex flex-col py-2">
  <div class="flex gap-3 flex-wrap w-full  items-center">

    <!-- Search input -->
    <div class="relative w-[290px]">
      <span class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path
            d="M14.5 14.75L10.0001 10.25M11.5 6.5C11.5 9.3995 9.1495 11.75 6.25 11.75C3.3505 11.75 1 9.3995 1 6.5C1 3.6005 3.3505 1.25 6.25 1.25C9.1495 1.25 11.5 3.6005 11.5 6.5Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="text-custom-muted"/>
        </svg>
      </span>
      <input
        type="text"
        placeholder="{{'accounts.search' | translate}}"
        (input)="this.inputSubject.next($event)"
        formControlName="searchText"
        class="w-full pl-10 pr-4 py-2 border border-custom-border rounded-[10px] h-[32px] focus:outline-none text-sm text-custom-primary bg-surface-2"
      />
    </div>

    <!-- Deposit Type dropdown -->
    <div
      #depositTypeTrigger="matMenuTrigger"
      [matMenuTriggerFor]="depositTypeMenu"
      class="border border-custom-border cursor-pointer rounded-[10px] bg-surface-2 select-none"
    >
      <div class="flex items-center gap-[6px] pl-[12px] pr-[10px] h-[32px]">

        <span class="text-[14px] font-normal text-custom-primary whitespace-nowrap">
          {{ 'deposits.deposit_type' | translate }}
        </span>

        <div
          *ngIf="filterForm.value?.depositType"
          [ngClass]="{'!border-primary-base': depositTypeTrigger.menuOpen || filterForm.value?.depositType}"
          class="flex items-center border border-transparent  gap-1 bg-surface-4 rounded-[8px] px-[6px] h-[20px]"
        >
          <span class="text-custom-primary text-[12px] font-medium leading-none">
            {{ getDepositTypeTitle(filterForm.value.depositType!) }}
          </span>
          <button
            (click)="removeFilter('depositType'); $event.stopPropagation()"
            class="flex items-center justify-center w-[14px] h-[14px] text-custom-primary hover:opacity-70"
          >
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
              <path d="M1 1L7 7M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="w-[20px] h-[20px] flex items-center justify-center ml-auto">
          <svg
            [ngClass]="{'rotate-180': depositTypeTrigger.menuOpen}"
            class="transition-transform duration-200 text-custom-muted"
            width="12" height="8" viewBox="0 0 12 8" fill="none"
          >
            <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <mat-menu #depositTypeMenu="matMenu" xPosition="after" class="menu-actions mt-2">
        <div class="flex flex-col  min-w-[160px]">
          <div
            *ngFor="let type of depositTypes"
            (click)="setFilter(type.code, 'depositType')"
            class="flex items-center px-3 py-2 rounded-[8px] cursor-pointer hover:bg-surface-2 text-[14px] leading-5 text-custom-secondary"
            [ngClass]="{'bg-surface-3 font-medium text-custom-primary': filterForm.value?.depositType === type.code}"
          >
            {{ type.title }}
          </div>
        </div>
      </mat-menu>
    </div>

    <!-- Currency dropdown -->
    <div
      #currencyTrigger="matMenuTrigger"
      [matMenuTriggerFor]="currencyMenu"

      class="border border-custom-border cursor-pointer rounded-[10px] bg-surface-2 select-none"
    >
      <div class="flex items-center gap-[6px] pl-[12px] pr-[10px] h-[32px]">
        <span class="text-[14px] font-normal text-custom-primary whitespace-nowrap">
          {{ 'main.currency' | translate }}
        </span>

        <div
          *ngIf="filterForm.value?.currency"
          [ngClass]="{'!border-primary-base': currencyTrigger.menuOpen || filterForm.value?.currency}"
          class="flex items-center border border-transparent gap-1 bg-surface-4 rounded-[8px] px-[6px] h-[20px]"
        >
          <img
            [src]="getCurrencyLogoUrl(filterForm.value.currency!)"
            width="14" height="14"
            class="rounded-full object-cover"
            alt=""
          />
          <span class="text-custom-primary text-[12px] font-medium leading-none">
            {{ filterForm.value.currency }}
          </span>
          <button
            (click)="removeFilter('currency'); $event.stopPropagation()"
            class="flex items-center justify-center w-[14px] h-[14px] text-custom-primary hover:opacity-70"
          >
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
              <path d="M1 1L7 7M7 1L1 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="w-[20px] h-[20px] flex items-center justify-center ml-auto">
          <svg
            [ngClass]="{'rotate-180': currencyTrigger.menuOpen}"
            class="transition-transform duration-200 text-custom-muted"
            width="12" height="8" viewBox="0 0 12 8" fill="none"
          >
            <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <mat-menu #currencyMenu="matMenu" xPosition="after" class="menu-actions mt-2">
        <div class="flex flex-col min-w-[120px]">
          <div
            *ngFor="let cur of currencies"
            (click)="setFilter(cur.code, 'currency')"
            class="flex items-center gap-3 p-[6px] rounded-[8px] cursor-pointer hover:bg-surface-2"
            [ngClass]="{'bg-surface-3': filterForm.value?.currency === cur.code}"
          >
            <img [src]="cur.logoUrl" width="20" height="20" class="rounded-full object-cover" alt="">
            <span class="text-[14px] leading-5 font-medium text-custom-secondary">{{ cur.code }}</span>
          </div>
        </div>
      </mat-menu>
    </div>

    <!-- Сбросить все / Clear all -->
    <div
      *ngIf="hasAnyFilter()"
      class="flex items-center gap-1 cursor-pointer"
      (click)="clearAllFilters()"
    >
      <span class="text-document-color font-medium text-[14px]">{{ 'global.clear_all' | translate }}</span>
      <img width="20" height="20" src="./assets/svg/close-active.svg" alt="">
    </div>

  </div>
</form>
