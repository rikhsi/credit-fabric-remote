<div class="bg-white  h-full flex flex-col space-y-4">

  <app-table-actions
    [tableActionBtns]="tableActionBtns"
    (onClick)="onActionClick($event)"
  ></app-table-actions>
  <app-container-table
    [columns]="tableColumns()"
    [data]="depositList()"
    [loading]="isFetching()"
    [custom]="true"
    (rowClicked)="onOpenLoanDetails($event)"
    [errorMessage]="errorMessage()"
    [size]="pageSize()"
    [checkable]="true"
    [numbering]="true"
  ></app-container-table>
</div>
