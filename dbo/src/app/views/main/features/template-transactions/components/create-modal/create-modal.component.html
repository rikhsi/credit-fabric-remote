<div class="flex flex-col bg-[#FFF] h-full overflow-y-auto pb-5">
  <div class="flex items-center justify-between h-[67px] py-6 px-8 border-b ">
    <h3 class="text-[#171717] text-[18px] font-semibold">{{ 'templates.create_template' | translate }}</h3>

    <div class="bg-[#F5F5F5] p-2 rounded-[10px]">
      <img class="w-[12px] h-[12px]" src="./assets/new-icons/close.svg" alt="">
    </div>
  </div>
  <div class="flex flex-col items-start px-5">
    @for (item of PAYMENT_ACTIONS; track item.title) {
      <div class="flex items-center justify-between w-full">
        <div
          (click)="navigateTo(item)"
          class="flex items-center gap-4 py-4 cursor-pointer"
          [matTooltip]="requestPermissions(item.link) ? '' : 'У вас нет прав'"
          [style.user-select]="requestPermissions(item.link) ? '' : 'none'"
          [style.opacity]="requestPermissions(item.link) ? '1' : '0.3'"
          [style.cursor]="requestPermissions(item.link) ? 'pointer' : 'not-allowed'"
        >
          <div
            class="p-3 bg-[#F5F5F5] rounded-[50px] inline-flex justify-start items-center gap-2.5"
          >
            <img [src]="item.img" alt="icon" class="w-6 h-6"/>
          </div>
          <div class="flex flex-col">
        <span class="text-[#101010] text-base font-medium leading-normal tracking-tight">
          {{ item.titleTranslateKey | translate }}
        </span>
            <span class="text-[#A3A3A3] text-base font-normal leading-normal tracking-tight">
          {{ item.textTranslateKey | translate }}
        </span>
          </div>
        </div>
        <div>
          <img src="./assets/new-icons/right-icon.svg" alt="">
        </div>
      </div>
    }
  </div>
  <div *ngIf="!loading" class="flex flex-col items-start px-5">

  </div>
</div>
