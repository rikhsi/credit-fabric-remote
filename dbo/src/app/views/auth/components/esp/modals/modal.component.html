<div
  *ngIf="visible"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  (click)="onClose()"
>
  <div
    class="bg-white rounded-[17px] shadow-lg w-full max-w-lg mx-4 px-9 pb-9 pt-18 relative"
    (click)="$event.stopPropagation()"
  >
    <img (click)="onClose()" class="absolute cursor-pointer w-[12px] h-[12px] top-[15px] right-[20px]" src="./assets/new-icons/close.svg" alt="">
    <div class="flex justify-center items-center py-4 mt-8">
      <h3 class="text-[26px] font-bold">{{ title }}</h3>
    </div>

    <div class="">
      <ng-content></ng-content>
    </div>
  </div>
</div>
