<div class="flex flex-col gap-y-5">
  <div class="flex items-center justify-between">
    <div class="text-[18px] font-medium text-[#2B2D33] leading-[14px]">Отчёты</div>

    <app-filter-button
      class="flex justify-end"
      (click)="filterState = !filterState"
      [classes]="!filterState ? 'bg-[#008C79] text-white' : ''"
      [src]="!filterState ? './assets/svg/filter-white.svg' : './assets/svg/filter-black.svg'"
    ></app-filter-button>
  </div>

  <app-app-filter
    [disableType]="true"
    [dateRange]="true"
    (filterChange)="setFilter($event)"
    [toggleActive]="true"
    [panelState]="filterState"
  ></app-app-filter>

  <div class="flex flex-col gap-y-2.5">
    @if(loading) {
      <div class="flex justify-center">
        <mat-spinner></mat-spinner>
      </div>
    }
    @else {
<!--      @if(loadingExcel) {-->
<!--        <div class="w-full h-[72px] animate-pulse rounded-xl p-2 bg-gray-100 flex justify-between mb-1">-->
<!--          <div class="h-full w-1/3">-->
<!--            <div class="h-3 w-full rounded-xl bg-secondary my-1"></div>-->
<!--            <div class="h-3 w-full rounded-xl bg-secondary my-1"></div>-->
<!--            <div class="h-3 w-full rounded-xl bg-secondary my-1"></div>-->
<!--          </div>-->
<!--          <div class="self-end h-3 w-1/6 rounded-[2px] bg-secondary"></div>-->
<!--        </div>-->
<!--        <mat-divider></mat-divider>-->
<!--      }-->
      @for(app of apps; track app.applicationId; let last = $last) {
        <app-report-card @slideIn [application]="app"></app-report-card>
        @if(!last) {
          <mat-divider></mat-divider>
        }
      }
    }
  </div>
</div>
