<div
  class="flex flex-col"
  [ngClass]="{ wrapperClass: isOpenRequisites}"
>
  <div class="self-end">
    <div class="flex cursor-pointer" (click)="toggleRequisites()">
      <div
        class="flex items-center gap-x-2.5"
      >

         <img ngSrc="./assets/svg/info-circle-gray.svg" height="24" width="24" alt="#">
         <span class="text-[#2b2d33] text-sm font-normal leading-snug flex-nowrap">{{ isOpenRequisites ? 'Скрыть реквизиты' : 'Показать реквизиты' }}</span>
      </div>
    </div>
  </div>


  <mat-accordion class="accordion">
    <mat-expansion-panel [expanded]="isOpenRequisites">
      @if (businessUser) {
        <div class="flex items-center gap-10 justify-center py-2.5 flex-wrap">
          <div>
            <span>Наименование: </span>
            <span class="text-end text-[#8A97A4]"> {{ businessUser.name }}</span>
          </div>
          <div>
            <span>ИНН: </span>
            <span class="text-end text-[#8A97A4]"> {{ businessUser.inn }}</span>
          </div>
          <div>
            <span>МФО: </span>
            <span class="text-end text-[#8A97A4]"> {{ businessUser.mfo }}</span>
          </div>
        </div>
      }
    </mat-expansion-panel>
  </mat-accordion>
</div>
