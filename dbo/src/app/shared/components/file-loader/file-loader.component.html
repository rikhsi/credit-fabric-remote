<div class="flex flex-col gap-y-[15px] border-b border-[#C5CAD0] py-4">
  <div class="flex flex-col gap-y-2.5">
    <div class="font-[600] leading-[19px]">
      <span>{{ title }} </span>
      @if(touched) {
        <span class="text-red-500 text-sm font-normal"> - Файл обязателен</span>
      }
    </div>

    <div class="text-[#6B7280] text-[12px]">
      {{ description }}
    </div>
  </div>

  @if(!file) {
    <label
      class="flex self-end items-center gap-2 bg-[#F3F4F6] text-[#111827] rounded-lg px-4 py-2 cursor-pointer hover:bg-[#e5e7eb] transition"
    >
      <img src="./assets/svg/attach.svg" alt="attach">
      <span>Загрузить документы</span>
      <input type="file" class="hidden" (change)="onFileSelected($event)" />
    </label>
  } @else {
    <div class="h-[70px] p-5 border border-[#E4E4E4] rounded-[5px]">
      <div class="flex justify-between">
        <div class="h-6 flex items-center gap-x-5">
          <img src="./assets/svg/attach.svg" alt="attach">
          <div class="font-medium">{{ file.name }}</div>
        </div>

        <div
          class="h-[30px] w-[88px] flex items-center gap-x-2 bg-[#DDECFC] rounded-[5px] py-2.5 px-2 cursor-pointer"
          (click)="remove()"
        >
          <img src="./assets/svg/trash-error.svg" alt="trash">

          <div class="text-[12px] text-[#FF3333]">Удалить</div>
        </div>
      </div>
    </div>
  }
</div>
