<div class="flex text-[11px]">
  @for(nav of navs; track nav; let last = $last) {
    @if(last) {
      <span>{{ nav.title }}</span>
    } @else {
      <span
        class="text-[#7C8897] pe-1 cursor-pointer"
        [routerLink]="nav.link"
        [queryParams]="{ tab: nav?.tab }"
      >{{ nav.title }} / </span>
    }
  }
</div>
