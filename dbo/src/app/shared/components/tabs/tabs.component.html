<div class="flex p-[5px] w-fit rounded-[5px] items-center bg-[#EFF4F9]">
  @for(tab of tabs; track tab?.value) {
    <div
      class="py-[5px] px-[20px] rounded-[5px] text-[14px] leading-[22px] text-[#B0B8C1] cursor-pointer"
      (click)="selectTab(tab)"
      [ngClass]="{'bg-[#264796] text-white': selectedTab.value == tab?.value }"
    >
      <div class="text-nowrap">{{ tab?.name }}</div>
    </div>
  }
</div>
