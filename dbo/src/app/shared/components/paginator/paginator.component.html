<div class="flex justify-end gap-5">
  <div class="flex items-center">
    <span class="text-[#8A97A4]">Всего: {{ totalItems }}</span>
  </div>

  <div class="flex gap-x-5 items-center page-select">
    <mat-form-field appearance="outline" color="primary">
      <mat-select (valueChange)="perPage($event)" [(value)]="selectedPageSize" class="w-[130px]">
        <mat-select-trigger>
          <div class="text-sm">
            @if(selectedPageSize !== totalItems) {
              <span>Показать по {{ selectedPageSize }}</span>
            } @else {
              <span>Показать все</span>
            }
          </div>
        </mat-select-trigger>

        @for(pSize of pageSizes; track pSize) {
          <mat-option [value]="pSize">{{ pSize }}</mat-option>
        }
        <mat-option [value]="totalItems">Все</mat-option>
      </mat-select>

      <mat-icon matSuffix class="relative -top-[5px]">
        <img matSuffix class="rotate-90" ngSrc="./assets/svg/chevron-down.svg" alt="chevron" width="24" height="24" />
      </mat-icon>
    </mat-form-field>
  </div>

  <div class="flex items-center">
    <span class="text-[#8A97A4]">Страница {{ currentPage }} из {{ totalPages }}</span>
  </div>

  <div class="flex gap-x-[5px] h-[40px]">
    <button
      class="flex items-center p-2.5 rounded-[5px] bg-[#EFF4F9]"
      [disabled]="currentPage === 1"
    >
      <img ngSrc="./assets/svg/chevron-left.svg" alt="chevron-left" width="24" height="24">
    </button>

<!--    <div class="rounded-[5px] p-2.5 border w-[56px] text-center border-[#E4E4E4]">{{ currentPage }}</div>-->

    <input
      matInput
      type="number"
      [min]="1"
      [max]="totalPages"
      [disabled]="totalPages === currentPage"
      class="w-[56px] p-2.5 border text-center rounded-[5px] border-[#E4E4E4]"
      [value]="currentPage"
      (input)="enforceRange($event)"
    >

    <button
      class="flex items-center p-2.5 rounded-[5px] bg-[#EFF4F9]"
      [disabled]="currentPage === totalPages || totalPages === 0"
    >
      <img ngSrc="./assets/svg/chevron-right.svg" alt="chevron-right" width="24" height="24">
    </button>
  </div>
</div>
