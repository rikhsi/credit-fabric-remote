<div
  class="m-auto flex flex-col text-center justify-center items-center gap-4"
  [style.height]="height()"
>
  <!-- Icon -->
  <img
    [src]="resolvedIcon()"
    alt=""
    width="68"
    height="68"
  />

  <!-- Title -->
  <p class="text-[#171717] font-semibold text-[18px]">
    {{ titleKey() ? (titleKey()! | translate) : title() }}
  </p>

  <!-- Description (single or multiline) -->
  <ng-container *ngIf="descriptionKey() || description()">
        <span class="text-[#A3A3A3] text-[16px] font-normal max-w-[320px]">
          {{ descriptionKey() ? (descriptionKey()! | translate) : description() }}
        </span>
  </ng-container>

  <!-- Optional CTA button -->
  <button
    *ngIf="action()"
    (click)="onActionClick()"
    [matTooltip]="action()!.disabled ? (action()!.disabledTooltip ?? '') : ''"
    [style.user-select]="action()!.disabled ? 'none' : 'auto'"
    [style.opacity]="action()!.disabled ? '0.3' : '1'"
    [style.cursor]="action()!.disabled ? 'not-allowed' : 'pointer'"
    class="!h-[48px] min-w-[190px] px-5 flex items-center gap-1
               border border-custom-border bg-[#00A38D] rounded-[12px]"
  >
        <span class="text-[16px] font-semibold leading-[16px] text-white">
          {{ action()!.translateKey !== false ? (action()!.label | translate) : action()!.label }}
        </span>
    <img ngSrc="./assets/svg/add-active.svg" alt="add" width="24" height="24" />
  </button>
</div>
