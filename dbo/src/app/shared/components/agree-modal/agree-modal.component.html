<div class="flex flex-col gap-y-3 px-6 bg-[#FFF] h-full overflow-y-auto pb-5">

  <div class="flex justify-between items-center gap-x-5 py-5 border-b border-[#E2EAF1]">
    <div class="text-[22px] text-black">{{ data.title }}</div>

    <mat-icon
      class="cursor-pointer top-[-15px] right-[-15px] hover:rotate-180 transition-all"
      mat-ripple
      mat-dialog-close
    >close</mat-icon>
  </div>

  <div class="w-full mt-4 gap-x-5">
    <button
      mat-dialog-close
      class="px-5 py-2.5 w-full rounded-[5px] bg-[#F5F5F5] leading-[20px]"
    >{{ data.cancel || 'Отмена' }}
    </button>
  </div>
</div>
