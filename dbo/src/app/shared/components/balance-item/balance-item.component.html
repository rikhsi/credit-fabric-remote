<div class="flex flex-col gap-y-2.5">
  <div class="flex gap-x-2.5 justify-between">
    <div class="flex gap-x-2.5">
      <div>{{ title }}</div>
      <div>•</div>
      <img [ngSrc]="'./assets/svg/' + svg" alt="card" width="27" height="18" />
    </div>
    <div class="justify-self-end">
      <img ngSrc="./assets/svg/3-dots.svg" alt="actions" width="24" height="24">
    </div>
  </div>

  <div class="font-medium text-[22px]">
    <span>{{ Math.floor(amount/100) | mask: 'separator' }}</span>
    <span>,{{ (amount%100).toString().padStart(2, "0") }}</span>
    <span> {{ currency }}</span>
  </div>
</div>
