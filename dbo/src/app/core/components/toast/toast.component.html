<div class="toast w-fit p-6 flex justify-between items-center relative">
<!--  <img src="./assets/new-icons/sucess-toast.svg" alt="">-->
  <span class="icon h-[40px] w-[40px] rounded-[13px] m-auto absolute top-1/2 translate-y-[-50%] flex items-center "></span>
  <div class="w-full flex flex-col gap-1 mx-14">
    <p [ngClass]="title ? 'available_text_toast' : ''" class="title text-[16px] font-semibold relative text-black" [innerHTML]="title"></p>
    <div class="text-[14px] leading-2 text-[#A3A3A3]" [innerHTML]="message"></div>
  </div>
   <img src="./assets/new-icons/close.svg" alt="dd" class="w-[14px] h-[14px]"
    (click)="remove()"/>
</div>
