@if (isEmpty()) {
<div class="empty">
  <img src="images/no-content.png" alt="no-content" />

  <button nz-button nzType="primary" nzSize="large">
    <nz-icon nzType="plus" />
    Добавить финансовые данные
  </button>

  <button nz-button nzType="default" nzSize="large" class="back" routerLink="../general">Назад</button>
</div>
} @else {
<cf-finance-info (add)="openFinanceForm()" (edit)="openFinanceForm()" />

<div class="actions">
  <button nz-button nzType="default" nzSize="large" class="back" routerLink="../general">Назад</button>

  <button nz-button nzType="primary" nzSize="large" (click)="finish()">Завершить</button>
</div>
}
