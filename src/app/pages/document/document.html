<ng-container *transloco="let t">
  <div class="top">
    <a cfBounce nz-button nzType="link" class="link" (clicked)="onBack()">
      <nz-icon nzType="f:arrowBack" />
      {{t('action.back')}}
    </a>
  </div>

  <nz-spin [nzSpinning]="isLoading()" class="spin">
    <div class="content">
      <ngx-extended-pdf-viewer
        (pdfLoaded)="pdfLoaded()"
        (pdfLoadingFailed)="pdfFailed()"
        [showToolbar]="false"
        [src]="file()"
        class="pdf"
      ></ngx-extended-pdf-viewer>
    </div>
  </nz-spin>

  <div class="footer">
    <button cfBounce [disabled]="isLoading()" nz-button nzBlock nzSize="large" nzType="primary" (clicked)="onSign()">
      {{t('action.sign')}}
    </button>
  </div>
</ng-container>
