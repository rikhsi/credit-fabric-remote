<ng-container *transloco="let t">
  @switch (status()) { @case('APPROVED') {
  <button nz-button nzSize="small" [disabled]="disabled()" (click)="declined.emit()">{{t('action.decline')}}</button>
  <button nz-button nzSize="small" [disabled]="disabled()" nzType="primary" (click)="approved.emit()">{{t('action.approve')}}</button>
  } }
</ng-container>
