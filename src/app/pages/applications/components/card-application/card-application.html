<ng-container *transloco="let t">
  <cf-card [showSpace]="true" [titleRef]="baseRef" class="bordered card">
    <div actions>
      <cf-tag-application [status]="status()" />
    </div>

    <cf-comment-application [status]="status()" />

    <div class="box">
      <div class="infos">
        <cf-label-control-secondary [label]="t('prop.product')" [size]="'small'">
          <h6 nz-typography>{{title()}}</h6>
        </cf-label-control-secondary>

        <cf-label-control-secondary [label]="t('prop.loan_amount_full')" [size]="'small'">
          <h6 nz-typography>{{amount() | number}} {{currency()}}</h6>
        </cf-label-control-secondary>

        <cf-label-control-secondary [label]="t('prop.loan_term_full')" [size]="'small'">
          <h6 nz-typography>{{term() | number}}</h6>
        </cf-label-control-secondary>

        <cf-label-control-secondary [label]="t('prop.loan_percent_full')" [size]="'small'">
          <h6 nz-typography>{{rate() | number}}%</h6>
        </cf-label-control-secondary>

        <cf-label-control-secondary [label]="t('prop.loan_calculation_type')" [size]="'small'">
          <h6 nz-typography>{{t('prop.' + paymentType() | lowercase)}}</h6>
        </cf-label-control-secondary>
      </div>

      <cf-action-application (goToApplication)="goToApplication.emit()" />
    </div>
  </cf-card>

  <ng-template #baseRef>
    <div class="base">
      <h5 nz-typography>{{t('application.number', {id: id()})}}</h5>

      <cf-status-application [status]="status()" />
    </div>
  </ng-template>
</ng-container>
