<ng-container *transloco="let t">
  <div class="icon">
    @switch (status()) { @case('IN_PROGRESS') {
    <nz-icon nzType="f:clock" class="warning" />
    } @case('ON_DESIGN') {
    <nz-icon nzType="f:doc" class="design" />
    } @case('ON_FORM_FILL') {
    <nz-icon nzType="f:pencil" class="form-fill" />
    } @case('ON_DECISION') {
    <nz-icon nzType="f:success" class="success" />
    } @case('APPROVED') {
    <nz-icon nzType="f:success" class="success" />
    } @case('SIGNED') {
    <nz-icon nzType="f:success" class="success" />
    } @case('DECLINE') {
    <nz-icon nzType="f:success" class="decline" />
    } @case('DECLINE_CLIENT') {
    <nz-icon nzType="f:success" class="decline" />
    } @case('ISSUED') {
    <nz-icon nzType="f:success" class="success" />
    } @case('ERROR') {
    <nz-icon nzType="close" class="decline" />
    } }
  </div>

  <b class="sm">{{t(status() | applicationStatus)}}</b>
</ng-container>
