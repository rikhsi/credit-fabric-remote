<ng-container *transloco="let t">
  <cf-card [showSpace]="false" [titleRef]="headerRef" class="bordered card">
    <div actions>
      <cf-comment-application [status]="application().sysStatusId" class="borderless" />
    </div>

    <nz-tag class="tag warning validity">Решение банка будет действительно 5 календарных дней до 23.01.2026 включительно</nz-tag>

    <cf-application-product-info [product]="application().product" />

    <div class="section">
      <h5 nz-typography class="section-title">Счёт зачисления</h5>

      <cf-select-bill [accountNo]="application().accountNo" />

      <div class="notice">
        <nz-icon nzType="info-circle" />
        <p nz-typography>
          Средства будут перечислены на выбранный счёт. Для дальнейшего оформления необходимо обратиться в филиал банка, в котором открыт
          счёт.
        </p>
      </div>
    </div>

    <div class="footer">
      <button cfBounce nz-button nzType="default" nzSize="large">Отказаться</button>
      <button cfBounce nz-button nzType="primary" nzSize="large">Принять</button>
    </div>
  </cf-card>

  <ng-template #headerRef>
    <div class="base">
      <cf-status-application [status]="application().sysStatusId" />
    </div>
  </ng-template>
</ng-container>
