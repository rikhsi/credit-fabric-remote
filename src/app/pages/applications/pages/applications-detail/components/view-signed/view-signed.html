<ng-container *transloco="let t">
  <cf-card [showSpace]="true" [titleRef]="headerRef" class="bordered card">
    <div actions>
      <nz-tag class="tag decline message">Какой то текст</nz-tag>
    </div>

    <cf-application-product-info [product]="application().product" />

    <cf-docs-application [status]="application().sysStatusId" [docs]="docs()" class="docs borderless" />

    <div class="section">
      <h5 nz-typography class="section-title">Счёт зачисления</h5>

      <cf-select-bill [readonly]="true" [accountNo]="application().accountNo" />

      <div class="notice">
        <nz-icon nzType="info-circle" />
        <p nz-typography>
          Средства будут перечислены на выбранный счёт. Для дальнейшего оформления необходимо обратиться в филиал банка, в котором открыт
          счёт.
        </p>
      </div>
    </div>
  </cf-card>

  <ng-template #headerRef>
    <div class="base">
      <cf-status-application [status]="application().sysStatusId" />
    </div>
  </ng-template>
</ng-container>
