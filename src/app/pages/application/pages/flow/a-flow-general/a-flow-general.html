<ng-container *transloco="let t">
  <cf-general-info [application]="application" [form]="flowForm()" />
  <cf-contact-info />
  <cf-address-info (edit)="openAddressForm()" />
  <cf-extra-info [items]="flowForm().extraInformations().value()" (edit)="openGeneralForm()" (add)="openGeneralForm()" />

  <button nz-button nzType="primary" nzSize="large" (click)="continue()" class="submit">{{t('action.continue')}}</button>
</ng-container>
