<ng-container *transloco="let t">
  <cf-card [title]="t('prop.finances')" [showSpace]="true" class="bordered">
    <cf-steps [stepsLength]="3" [currentStep]="2" class="step" />

    <cf-finance-form [form]="flowForm()" />
  </cf-card>

  <button cfBounce nz-button nzType="primary" nzSize="large" (clicked)="continue()" class="submit">{{ t('action.continue') }}</button>
</ng-container>
