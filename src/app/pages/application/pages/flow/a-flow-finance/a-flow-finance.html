<ng-container *transloco="let t">
  <cf-card [title]="t('prop.finances')" [showSpace]="true" class="bordered">
    <cf-steps [stepsLength]="2" [currentStep]="2" class="step" />

    <cf-finance-form [form]="flowForm()" />
  </cf-card>

  <button nz-button nzType="primary" nzSize="large" [nzLoading]="submitting()" [disabled]="submitting()" (click)="finish()" class="submit">
    {{ t('action.finish') }}
  </button>
</ng-container>
