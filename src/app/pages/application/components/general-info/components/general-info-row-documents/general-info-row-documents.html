<ng-container *transloco="let t">
  @if (borrower()?.docPersonalLegalNo) {
  <cf-label-control-secondary style="align-items: flex-start" [label]="t('prop.pinfl')">
    {{ borrower()!.docPersonalLegalNo }}
  </cf-label-control-secondary>
  } @else {
  <cf-label-control-secondary style="align-items: flex-start; width: 100%" [label]="t('prop.pinfl')">
    <cf-input-default
      [mask]="'00000000000000'"
      [formField]="form().docPersonalLegalNo"
      [placeholder]="t('control.input.placeholder')"
      size="large"
    />
  </cf-label-control-secondary>
  } @if (borrower()?.registrationNumber) {
  <cf-label-control-secondary style="align-items: flex-start" [label]="t('prop.registration_number')">
    <span>{{ borrower()!.registrationNumber }}</span>
  </cf-label-control-secondary>
  } @else {
  <cf-label-control-secondary style="align-items: flex-start; width: 100%" [label]="t('prop.registration_number')">
    <cf-input-default [formField]="form().registrationNumber" [placeholder]="t('control.input.placeholder')" size="large" />
  </cf-label-control-secondary>
  }
</ng-container>
