@let borrower = application()?.borrower;

<ng-container *transloco="let t">
  <cf-card [title]="t('prop.general_info')" [showSpace]="true" class="bordered bottom">
    <cf-steps [stepsLength]="3" [currentStep]="1" class="step" />

    <div class="col">
      <cf-general-info-row-name [borrower]="borrower" [form]="form()" class="row" />
      <cf-general-info-row-documents [borrower]="borrower" [form]="form()" class="row" />
      <cf-general-info-row-authority [borrower]="borrower" [form]="form()" class="row" />
      <cf-general-info-row-employment [borrower]="borrower" [form]="form()" class="row bottom-gap" />
    </div>
  </cf-card>
</ng-container>
