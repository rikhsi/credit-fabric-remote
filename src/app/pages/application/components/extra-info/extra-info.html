<ng-container *transloco="let t">
  <cf-card [title]="t('prop.extra_params')" [showSpace]="true" class="bordered">
    <div actions>
      <button nz-button nzType="default" nzSize="default" nzGhost (click)="add.emit()">
        <strong>{{t('action.add')}}</strong>

        <nz-icon nzType="plus" class="primary" />
      </button>
    </div>

    <div class="list">
      @for (item of items(); track $index) {
      <cf-extra-info-item [item]="item" (edit)="edit.emit($index)" />
      } @empty {
      <div class="empty">
        <h3 nz-typography>{{t('action.add_extra_params')}}</h3>
      </div>
      }
    </div>
  </cf-card>
</ng-container>
