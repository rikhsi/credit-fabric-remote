<ng-container *transloco="let t">
  <cf-form-box [submitDisabled]="form().invalid()" [title]="t('action.add_address')" (closeClick)="close()" (submitClick)="submit()">
    <cf-select-default [formField]="form.addressType" [placeholder]="t('prop.address_type')" size="large">
      <ng-container *cfHandbook="{url: 'sys-address-type'}; let items">
        @for (item of items; track item.id) {
        <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
        }
      </ng-container>
    </cf-select-default>

    <cf-select-default [formField]="form.city" [placeholder]="t('prop.city')" size="large">
      <ng-container *cfHandbook="{url: 'dir-city'}; let items">
        @for (item of items; track item.id) {
        <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
        }
      </ng-container>
    </cf-select-default>

    <cf-select-default [formField]="form.street" [placeholder]="t('prop.street')" size="large">
      <ng-container *cfHandbook="{ url: 'dir-village' , params: {dir_city_id: form.city().value()}}; let items">
        @for (item of items; track item.id) {
        <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
        }
      </ng-container>
    </cf-select-default>

    <cf-input-default [formField]="form.address" [placeholder]="t('prop.address')" size="large" />
    <cf-input-default [formField]="form.postalCode" [placeholder]="t('prop.postal_code')" size="large" />
  </cf-form-box>
</ng-container>
