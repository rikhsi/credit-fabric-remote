<ng-container *transloco="let t">
  <cf-form-box [title]="t('prop.address')" (closeClick)="modalRef.close()" (submitClick)="modalRef.close()">
    <cf-select-default [placeholder]="t('prop.address_type')" size="large">
      <nz-option nzValue="option1" nzLabel="Option 1"></nz-option>
      <nz-option nzValue="option2" nzLabel="Option 2"></nz-option>
    </cf-select-default>

    <cf-select-default [placeholder]="t('prop.region')" size="large">
      <nz-option nzValue="option1" nzLabel="Option 1"></nz-option>
      <nz-option nzValue="option2" nzLabel="Option 2"></nz-option>
    </cf-select-default>

    <cf-select-default [placeholder]="t('prop.street')" size="large">
      <nz-option nzValue="option1" nzLabel="Option 1"></nz-option>
      <nz-option nzValue="option2" nzLabel="Option 2"></nz-option>
    </cf-select-default>

    <cf-input-default [placeholder]="t('prop.address')" size="large" />
    <cf-input-default [placeholder]="t('prop.postal_code')" size="large" />
  </cf-form-box>
</ng-container>
