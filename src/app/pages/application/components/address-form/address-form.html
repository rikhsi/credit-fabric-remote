<ng-container *transloco="let t">
  <cf-form-box
    [submitDisabled]="addressForm().disabled() || addressForm().invalid()"
    [title]="t('action.add_address')"
    (closeClick)="close()"
    (submitClick)="submit()"
  >
    <ng-container *cfHandbook="{ url: 'sys-address-type' }; let items">
      <cf-input-default
        [disabled]="true"
        [value]="items | handbook: addressForm.sysAddressTypeId().value()"
        [placeholder]="t('prop.address_type')"
        size="large"
      />
    </ng-container>

    <cf-select-default [formField]="addressForm.dirCityId" [placeholder]="t('prop.city')" size="large">
      <ng-container *cfHandbook="{ url: 'dir-city' }; let items">
        @for (item of items; track item.id) {
        <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
        }
      </ng-container>
    </cf-select-default>

    @if (addressForm.dirCityId().value()) {
    <cf-select-default
      [formField]="addressForm.dirVillageId"
      cfResetVillageOnCityChange
      [cfResetVillageOnCityChange]="addressForm"
      [placeholder]="t('prop.street')"
      size="large"
    >
      <ng-container *cfHandbook="{ url: 'dir-village', params: { dir_city_id: addressForm.dirCityId().value() } }; let items">
        @for (item of items; track item.id) {
        <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
        }
      </ng-container>
    </cf-select-default>
    }

    <cf-input-default [formField]="addressForm.street" [placeholder]="t('prop.street')" size="large" />
    <cf-input-default [formField]="addressForm.zipCode" [placeholder]="t('prop.postal_code')" size="large" />
  </cf-form-box>
</ng-container>
