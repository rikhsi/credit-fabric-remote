<ng-container *transloco="let t">
  <cf-card [titleRef]="titleRef" [showSpace]="true" class="bordered">
    <div class="list">
      @for (item of items(); track item.addressType) {
      <cf-address-info-item [item]="item" (edit)="edit.emit($index)" />
      }
    </div>
  </cf-card>

  <ng-template #titleRef>
    <div class="titleRef">
      <h2 nz-typography>{{t('prop.addresses')}}</h2>

      @if (hasIncomplete()) {
      <nz-tag>
        <nz-icon nzType="info-circle" />
        {{t('alert.fill_fields')}}
      </nz-tag>
      }
    </div>
  </ng-template>
</ng-container>
