<ng-container *transloco="let t">
  <cf-card [title]="t('prop.contacts')" [showSpace]="true" class="bordered">
    <div class="contact-info__grid">
      @if(user()?.phone) {
      <cf-label-control-secondary [label]="t('prop.phone_number')">{{ user()?.phone | phoneNumber }}</cf-label-control-secondary>
      } @if(user()?.email) {
      <cf-label-control-secondary [label]="t('prop.email')">{{ user()?.email }}</cf-label-control-secondary>
      }
    </div>
  </cf-card>
</ng-container>
