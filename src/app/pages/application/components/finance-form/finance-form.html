<ng-container *transloco="let t">
  <div class="finance-form">
    <div class="finance-form__general">
      <cf-select-default [formField]="form().finData.dirCompanyActivityId" [placeholder]="t('prop.actual_business_activity')" size="large">
        <ng-container *cfHandbook="{ url: 'dir-company-activity' }; let items">
          @for (item of items; track item.id) {
          <nz-option [nzValue]="item.id" [nzLabel]="item.name"></nz-option>
          }
        </ng-container>
      </cf-select-default>

      <cf-input-default [formField]="form().finData.activityTerm" [placeholder]="t('prop.experience_in_business_activity')" size="large" />
    </div>

    <h4 class="finance-form__title">{{ t('prop.financial_activity_over') }}</h4>

    <div class="finance-form__months">
      <article class="month-card">
        <h5 class="month-card__label">{{ month1Label() }}</h5>

        <cf-input-default
          [formField]="form().finData.month1Revenue"
          [placeholder]="t('prop.benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />

        <cf-input-default
          [formField]="form().finData.month1Income"
          [placeholder]="t('prop.pure_benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />
      </article>

      <article class="month-card">
        <h5 class="month-card__label">{{ month2Label() }}</h5>

        <cf-input-default
          [formField]="form().finData.month2Revenue"
          [placeholder]="t('prop.benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />

        <cf-input-default
          [formField]="form().finData.month2Income"
          [placeholder]="t('prop.pure_benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />
      </article>

      <article class="month-card">
        <h5 class="month-card__label">{{ month3Label() }}</h5>

        <cf-input-default
          [formField]="form().finData.month3Revenue"
          [placeholder]="t('prop.benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />

        <cf-input-default
          [formField]="form().finData.month3Income"
          [placeholder]="t('prop.pure_benefit')"
          mask="separator.0"
          thousandSeparator=" "
          size="large"
        />
      </article>
    </div>
  </div>
</ng-container>
