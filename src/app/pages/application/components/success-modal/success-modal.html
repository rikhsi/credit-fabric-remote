<ng-container *transloco="let t">
  <div class="header">
    <button nz-button nzShape="round" nzSize="small" class="close" (click)="cancel()">
      <nz-icon nzType="close" />
    </button>
  </div>

  <div class="content">
    <div class="text">
      <h1 nz-typography>{{t('prop.application_sended')}}</h1>

      <p nz-typography>{{t('prop.application')}} № {{ config()?.id }}</p>

      <h2 nz-typography>{{ config()?.amount | number }}</h2>
    </div>
  </div>

  <div class="footer">
    <button nz-button nzShape="round" nzSize="large">
      <nz-icon nzType="info-circle" />
    </button>
    <button nz-button nzType="primary" nzSize="large" (click)="submit()">
      <strong>{{ t('action.back_to_loan') }}</strong>
    </button>
  </div>
</ng-container>
