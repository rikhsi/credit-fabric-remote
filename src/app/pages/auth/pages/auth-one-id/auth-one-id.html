@let submitId = 'action.enter';

<ng-container *transloco="let t">
  <h1 nz-typography class="title">{{t('auth.welcome')}}</h1>
  <p nz-typography class="description">{{t('auth.description.one_id')}}</p>

  <button [id]="submitId" nz-button nzType="primary" nzSize="large" nzBlock (click)="onSubmit()">{{t('action.enter')}}</button>
</ng-container>
