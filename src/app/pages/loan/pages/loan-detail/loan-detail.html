<ng-container *transloco="let t">
  <cf-product-info />

  <cf-card [showSpace]="true" [title]="t('benefit.title')" class="bordered">
    <div class="advantages">
      @for (item of advantages; track item.title) {
      <cf-card-advantage [title]="item.title" [description]="item.description" [photo]="item.photo" />
      }
    </div>
  </cf-card>

  <cf-card [title]="t('prop.online_credit_calc')" [showSpace]="true" class="bordered">
    <div class="calculator">
      <cf-calculator-form />
      <cf-calculator-result [loanAmount]="1000000" [monthlyPayment]="100000" [interestRate]="10" [documents]="['Паспорт']" />
    </div>

    <cf-product-acception />
  </cf-card>
</ng-container>
