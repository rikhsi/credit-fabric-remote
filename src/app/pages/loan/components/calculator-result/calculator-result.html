<ng-container *transloco="let t">
  <cf-card class="card">
    <div class="box">
      <cf-label-control-secondary [label]="t('prop.loan_percent_full')">{{ interestRate() ?? 0 }}%</cf-label-control-secondary>
      <cf-label-control-secondary [label]="t('prop.loan_amount_full')">
        {{ $any(loanAmount() | number) }} {{$any(loanAmount()) | pluralize: 'money' : false | transloco}}
      </cf-label-control-secondary>
      <cf-label-control-secondary [label]="t('prop.loan_monthly_payment')">
        {{ $any(monthlyPayment() | number) }} {{$any(loanAmount()) | pluralize: 'money' : false | transloco}}
      </cf-label-control-secondary>

      <cf-label-control-secondary [label]="t('prop.loan_needed_docs')">
        <div class="box__tags">
          @for (doc of documents(); track doc) {
          <nz-tag>{{ doc }}</nz-tag>
          }
        </div>
      </cf-label-control-secondary>
    </div>
  </cf-card>
</ng-container>
