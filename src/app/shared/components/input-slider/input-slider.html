<div class="input-slider">
  <input
    nz-input
    mask="separator.0"
    thousandSeparator=" "
    [suffix]="' ' + (value() | pluralize: prefixType() : false)"
    [(ngModel)]="value"
    (blur)="onBlur()"
    class="input"
  />

  <nz-slider
    class="input-slider__control"
    [nzMin]="min()"
    [nzMax]="max()"
    [nzStep]="step()"
    [nzDisabled]="disabled()"
    nzTooltipVisible="never"
    [(ngModel)]="value"
  />
</div>
