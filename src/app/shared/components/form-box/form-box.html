<ng-container *transloco="let t">
  <div class="top">
    <h3 nz-typography>{{t(title())}}</h3>
    <div class="form-box__toolbar">
      <button nz-button type="button" nzType="default" nzShape="circle" (click)="closeClick.emit()">
        <nz-icon nzType="close" />
      </button>
    </div>
  </div>

  <div class="content">
    <ng-content />
  </div>

  <div class="footer">
    <button nz-button nzSize="large" (click)="closeClick.emit()">{{t('action.cancel')}}</button>
    <button nz-button nzType="primary" nzSize="large" (click)="submitClick.emit()">{{t('action.save')}}</button>
  </div>
</ng-container>
