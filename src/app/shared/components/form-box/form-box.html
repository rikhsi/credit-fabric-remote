<ng-container *transloco="let t">
  <div class="top">
    <h3 nz-typography>{{t(title())}}</h3>
    <div class="form-box__toolbar">
      <button nz-button nzShape="circle" nzType="primary" nzSize="small" class="close gray" (click)="closeClick.emit()">
        <nz-icon nzType="close" />
      </button>
    </div>
  </div>

  <div class="content">
    <ng-content />
  </div>

  <div class="footer">
    <button nz-button nzSize="large" (click)="closeClick.emit()">Отменить</button>
    <button nz-button nzType="primary" nzSize="large" (click)="submitClick.emit()">Сохранить</button>
  </div>
</ng-container>
