<div class="select-default-mobile">
  <cf-select-default
    [(value)]="value"
    [(touched)]="touched"
    [(disabled)]="disabled"
    [errors]="errors()"
    [dirty]="dirty()"
    [id]="id()"
    [placeholder]="placeholder()"
    [size]="size()"
    [isFeedback]="isFeedback()"
    [isLoading]="handbookLoading()"
  >
    @for (option of options(); track option.value) {
    <nz-option [nzValue]="option.value" [nzLabel]="option.label"></nz-option>
    }
  </cf-select-default>

  <button type="button" class="select-default-mobile__trigger" [disabled]="disabled() || handbookLoading()" (click)="openSheet()"></button>

  <cf-bottom-sheet
    #bottomSheet
    [(value)]="value"
    [title]="placeholder() ?? ''"
    [options]="options()"
    [showSearch]="showSearch()"
    (closed)="onSheetClosed()"
  />
</div>
