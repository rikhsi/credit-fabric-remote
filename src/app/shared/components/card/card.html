<div class="top" [ngClass]="{space: showSpace(), noWrap: !topWrap()}">
  @if (link(); as link) {
  <a cfBounce nz-button nzType="link" class="link default" (clicked)="navigateByLink()">
    <nz-icon nzType="f:backLine" />
    <ng-container [ngTemplateOutlet]="titleRef() ?? titleTmp"></ng-container>
  </a>
  } @else {
  <ng-container [ngTemplateOutlet]="titleRef() ?? titleTmp"></ng-container>
  }
  <div class="actions">
    <ng-content select="[actions]" />
  </div>
</div>

<div class="content">
  <ng-content />
</div>

<ng-template #titleTmp>
  <h2 nz-typography>@if (title(); as title) { {{title}} }</h2>
</ng-template>
