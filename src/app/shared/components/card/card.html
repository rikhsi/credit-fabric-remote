<ng-container *transloco="let t">
  <div class="top" [ngClass]="{space: showSpace()}">
    <h2 nz-typography>@if (title(); as title) { {{t(title)}} }</h2>

    <div class="actions">
      <ng-content select="[actions]" />
    </div>
  </div>

  <div class="content">
    <ng-content />
  </div>
</ng-container>
