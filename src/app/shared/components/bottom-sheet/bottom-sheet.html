<ng-container *transloco="let t">
  <nz-drawer
    nzWrapClassName="cf-bottom-sheet-drawer"
    [nzVisible]="visible()"
    [nzHeight]="'auto'"
    [nzClosable]="false"
    nzPlacement="bottom"
    [nzMaskClosable]="true"
    (nzOnClose)="close()"
  >
    <ng-container *nzDrawerContent>
      <div class="cf-bottom-sheet" (touchstart)="onTouchStart($event)" (touchmove)="onTouchMove($event)" (touchend)="onTouchEnd()">
        <div class="cf-bottom-sheet__handle"></div>

        <div class="cf-bottom-sheet__header">
          <h3 class="cf-bottom-sheet__title">{{ title() }}</h3>

          <button cfBounce nz-button nzShape="round" nzSize="small" class="close" (clicked)="close()">
            <nz-icon nzType="close" />
          </button>
        </div>

        @if (showSearch()) {
        <nz-input-wrapper class="cf-bottom-sheet__search">
          <nz-icon nzInputPrefix nzType="search" />
          <input nz-input [placeholder]="t('control.select.search')" [ngModel]="search()" (ngModelChange)="search.set($event)" />
        </nz-input-wrapper>
        }

        <ul class="cf-bottom-sheet__list">
          @for (option of filteredOptions(); track option.value) {
          <li>
            <button
              type="button"
              class="cf-bottom-sheet__option"
              [class.cf-bottom-sheet__option--selected]="option.value === value()"
              (click)="selectOption(option)"
            >
              <span>{{ option.label }}</span>

              @if (option.value === value()) {
              <nz-icon nzType="check" class="cf-bottom-sheet__check" />
              }
            </button>
          </li>
          } @empty {
          <li class="cf-bottom-sheet__empty">{{ t('control.select.empty') }}</li>
          }
        </ul>
      </div>
    </ng-container>
  </nz-drawer>
</ng-container>
