<ng-container *transloco="let t">
  @let showErrors = dirty() || touched();
  <nz-form-item>
    <nz-form-control
      [nzValidateStatus]="firstError() | validationStatus: showErrors"
      [nzHasFeedback]="isFeedback()"
      [nzErrorTip]="showErrors && firstError() ? t(firstError() | validationMsg: true, { count: errorCount() }) : null"
      [nzValidatingTip]="showErrors && firstError() ? t(firstError() | validationMsg: true, { count: errorCount() }) : null"
      [nzWarningTip]="showErrors && firstError() ? t(firstError() | validationMsg: true, { count: errorCount() }) : null"
      [nzSuccessTip]="showErrors && firstError() ? t(firstError() | validationMsg: true, { count: errorCount() }) : null"
    >
      <div class="cf-select-default__control" [class.cf-select-default__control--sheet]="isXs()">
        <nz-select
          nzDropdownClassName="cf-select-default-dropdown"
          [nzSize]="size()"
          [nzId]="id()"
          [(ngModel)]="value"
          [nzShowSearch]="showSearch() && !isXs()"
          [nzPlaceHolder]="placeholder() ?? t('control.select.placeholder')"
          [nzLoading]="isLoading()"
          [disabled]="disabled() || !optionList().length || isLoading()"
          (click)="!isXs() && clicked.emit()"
          (nzFocus)="focusChange.emit()"
          (nzBlur)="onBlur()"
        >
          <ng-content />
        </nz-select>

        @if (isXs()) {
        <button
          type="button"
          class="cf-select-default__sheet-trigger"
          [disabled]="disabled() || !optionList().length || isLoading()"
          (click)="openBottomSheet(bottomSheet)"
        ></button>

        <cf-select-bottom-sheet
          #bottomSheet
          [(value)]="value"
          [options]="selectOptions()"
          [placeholder]="placeholder() ?? t('control.select.placeholder')"
          (closed)="onBlur()"
        />
        }
      </div>
    </nz-form-control>
  </nz-form-item>
</ng-container>
